name: Magic Formula (Greenblatt)
description: |
  Joel Greenblatt's magic formula. Combines ROC (Return on Capital)
  and earnings yield for systematic value investing.

triggers:
  return_on_capital:
    operator: ">"
    value: 50.0
  earnings_yield:
    operator: ">"
    value: 10.0
  debt_to_equity:
    operator: "<"
    value: 0.5

scoring:
  weight: 0.85
  min_threshold: 8.0
  factors:
    roc_score: 0.50
    earnings_yield: 0.30
    debt_ratio: 0.20

strategy:
  type: magic_formula
  holding_period: "1-2_years"
  position_sizing: "equal_weight"

signals:
  buy:
    primary: "ROC > 50% AND Earnings yield > 10%"
    confirmation: "Debt/Equity < 0.5"
  sell:
    profit_target: 30.0
    stop_loss: 15.0
    time_based: 120