name: Mean Reversion
description: |
  Buy when stock is oversold (RSI < 30) with potential for bounce-back.
  Mean reversion assumes prices return to historical average.

triggers:
  rsi:
    operator: "<"
    value: 30.0
  price_distance:
    operator: "<"
    value: 10.0
    unit: "percent_from_ma50"

scoring:
  weight: 1.0
  min_threshold: 8.0
  factors:
    rsi_score: 0.45
    distance_from_ma: 0.25
    volatility: 0.20
    volume: 0.10

strategy:
  type: mean_reversion
  holding_period: "3-10_days"
  position_sizing: "fixed_fraction"

signals:
  buy:
    primary: "RSI < 30"
    confirmation: "Price within 10% of 50-day MA"
  sell:
    profit_target: 8.0
    stop_loss: 7.0
    time_based: 10