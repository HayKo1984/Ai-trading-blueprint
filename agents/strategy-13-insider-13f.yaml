name: Smart Money Tracking
description: |
  Follow institutional investors via 13F filings. Buy when top funds
  accumulate positions. Track Berkshire, ARK, etc.

triggers:
  institutional_buying:
    operator: ">"
    value: 20.0
  smart_money_presence:
    operator: ">="
    value: 3
  new_position:
    operator: ">"
    value: 50.0

scoring:
  weight: 0.90
  min_threshold: 8.0
  factors:
    fund_count: 0.35
    total_invested: 0.35
    position_increase: 0.30

strategy:
  type: smart_money
  holding_period: "3-12_months"
  position_sizing: "kelly_criterion"

signals:
  buy:
    primary: "3+ top funds accumulating"
    confirmation: "Position increase > 20%"
  sell:
    profit_target: 25.0
    stop_loss: 10.0
    time_based: 90