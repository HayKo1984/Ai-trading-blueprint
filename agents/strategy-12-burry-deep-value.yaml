name: Deep Value (Burry)
description: |
  Michael Burry-inspired deep value. Find companies trading below
  book value with catalysts. Concentrated bets on turnarounds.

triggers:
  price_to_book:
    operator: "<"
    value: 0.7
  net_current_asset:
    operator: ">"
    value: 1.5
  turnaround_probability:
    operator: ">="
    value: 0.6

scoring:
  weight: 0.85
  min_threshold: 8.0
  factors:
    book_value: 0.40
    catalyst_strength: 0.35
    nca_ratio: 0.25

strategy:
  type: deep_value
  holding_period: "6-24_months"
  position_sizing: "concentrated"

signals:
  buy:
    primary: "P/B < 0.7 AND NCA > 1.5x price"
    confirmation: "Turnaround catalyst identified"
  sell:
    profit_target: 50.0
    stop_loss: 15.0
    time_based: 180